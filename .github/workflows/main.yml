name: Build SoftISP ONNX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install deps
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build ONNX models (algo + applier + coordinator)
        working-directory: softisp/onnx
        run: |
          # activate the venv created at the repository root
          source ../../venv/bin/activate
          python build_all.py --mode algo pipeline.json
          python build_all.py --mode applier pipeline.json
          python build_all.py --mode coordinator pipeline.json

      - name: Verify ONNX models
        run: |
          source venv/bin/activate
          python - <<'PY'
          import onnx, glob, sys
          files = glob.glob("softisp/onnx/onnxout/softisppipeline_test/*.onnx")
          if not files:
              print("No ONNX files found", file=sys.stderr)
              sys.exit(1)
          for f in files:
              print("Checking", f)
              onnx.checker.check_model(onnx.load(f))
          PY

      - name: Upload ONNX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: softisp-pipeline-onnx
          path: softisp/onnx/onnxout/softisppipeline_test/*.onnx
