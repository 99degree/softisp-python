name: Build SoftISP ONNX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workspace
        if: ${{ always() }}
        run: |
          echo "GITHUB_WORKSPACE=${{ github.workspace }}"
          pwd
          ls -la
          echo "Contents of workspace root:"
          ls -la "${{ github.workspace }}" || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment and install deps
        run: |
          python -m venv venv
          "${{ github.workspace }}/venv/bin/python" -m pip install --upgrade pip
          "${{ github.workspace }}/venv/bin/python" -m pip install -r requirements.txt

      - name: Build ONNX models (algo + applier + coordinator)
        working-directory: onnx
        run: |
          # run build_all.py that lives at onnx/build_all.py using the venv Python
          "${{ github.workspace }}/venv/bin/python" build_all.py --mode algo pipeline.json
          "${{ github.workspace }}/venv/bin/python" build_all.py --mode applier pipeline.json
          "${{ github.workspace }}/venv/bin/python" build_all.py --mode coordinator pipeline.json

      - name: Verify ONNX models
        working-directory: onnx
        run: |
          "${{ github.workspace }}/venv/bin/python" - <<'PY'
          import onnx, glob, sys
          files = glob.glob("onnx_out/softisp_pipeline_test/*.onnx")
          if not files:
              print("No ONNX files found in onnx/onnx_out/softisp_pipeline_test", file=sys.stderr)
              sys.exit(1)
          for f in files:
              print("Checking", f)
              onnx.checker.check_model(onnx.load(f))
          PY

      - name: Upload ONNX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: softisp-pipeline-onnx
          path: onnx/onnx_out/softisp_pipeline_test/*.onnx
